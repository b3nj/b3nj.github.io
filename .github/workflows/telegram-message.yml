name: Send Telegram Message

on:
  push

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get commit details
        run: |
          echo "COMMIT_MESSAGE=$(git log -1 --pretty=format:'%s')" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV
          echo "COMMIT_SHA=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
          echo "COMMIT_DATE=$(git log -1 --pretty=format:'%cd' --date=format:'%d %b %Y %H:%M')" >> $GITHUB_ENV
          echo "FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD | head -10 | tr '\n' '\n' | sed 's/^/• /' | tr '\n' '|' | sed 's/|$//')" >> $GITHUB_ENV
          echo "COMMIT_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}" >> $GITHUB_ENV
          echo "REPO_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" >> $GITHUB_ENV
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          echo "SITE_URL=https://bkraft.fr" >> $GITHUB_ENV

      - name: Send Telegram message
        env:
          TELEGRAM_API_TOKEN: ${{ secrets.TELEGRAM_API_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FILES_LIST=$(git diff --name-only HEAD~1 HEAD | head -10 | sed 's/^/• /' | python3 -c '
          import sys, html
          for line in sys.stdin:
              print(html.escape(line.rstrip()))
          ' | tr '\n' '\n')

          MESSAGE=$(python3 -c "
          import sys, html, os

          branch   = html.escape(os.environ.get('BRANCH_NAME',''))
          date     = html.escape(os.environ.get('COMMIT_DATE',''))
          author   = html.escape(os.environ.get('COMMIT_AUTHOR',''))
          message  = html.escape(os.environ.get('COMMIT_MESSAGE',''))
          sha      = html.escape(os.environ.get('COMMIT_SHA',''))

          print(f'''📦 <b>New push on <code>{branch}</code></b>

          🗓 {date}
          👤 {author}
          💬 {message}
          🔖 <code>{sha}</code>

          📁 <b>Changed files:</b>
          $FILES_LIST''')
          ")

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_API_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"parse_mode\": \"HTML\",
              \"text\": $(echo "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"reply_markup\": {
                \"inline_keyboard\": [[
                  {\"text\": \"🔍 View commit\", \"url\": \"${COMMIT_URL}\"},
                  {\"text\": \"📚 Open library\", \"url\": \"${SITE_URL}/books/\"},
                  {\"text\": \"🌐 Open site\", \"url\": \"${SITE_URL}\"}
                ]]
              }
            }"