name: Automatically generate new jekyll page per book

on:
  push:
    branches:
      - gh-pages
    paths:
      - _data/books.json

jobs:
  generatefiles:
  # because we're adding a file and deleting one existing from the current commit, it is required that write permissions are given
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: 'gh-pages'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: pip install pyyaml

    - name: Generate book pages
      run: |
        python3 -c "
        import json, os, re, urllib.request, yaml, traceback, sys

        DATA_FILE = '_data/books.json'
        OUTPUT_DIR = 'books'

        def slugify(text):
            text = re.sub(r'[^\w\s-]', '', text.lower())
            return re.sub(r'[-\s]+', '-', text).strip('-')

        with open(DATA_FILE, encoding='utf-8') as f:
            books = json.load(f)

        for i, book in enumerate(books):
            try:
                isbn_list = book.get('isbn', [])
                isbn = isbn_list[0] if isbn_list else None
                title = book.get('title', 'Untitled')
                slug = slugify(title) or isbn or 'unknown'
                front_matter = {'layout': 'book'}
                front_matter.update(book)
                page_dir = os.path.join(OUTPUT_DIR, isbn if isbn else slug)
                os.makedirs(page_dir, exist_ok=True)
                out_path = os.path.join(page_dir, 'index.md')
                with open(out_path, 'w', encoding='utf-8') as f:
                    f.write('---\n')
                    yaml.dump(front_matter, f, allow_unicode=True, default_flow_style=False, sort_keys=False)
                    f.write('---\n')
                print(f'[{i}] OK: {out_path}')
            except Exception:
                print(f'[{i}] ERROR:')
                traceback.print_exc()
        "
        find books/ -type f || echo "books/ folder is empty or missing"

        cat scripts/generate_book_pages.py
        python3 scripts/generate_book_pages.py
        echo "Books folder contents:"
        find books/ -type f || echo "books/ folder is empty or missing"

    - name: Add new files and commit
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add -A books/
        git diff --cached --quiet || git commit -m 'Automatically added new book' && git push