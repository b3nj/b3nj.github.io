name: Automatically generate new jekyll page per book

on:
  push:
    branches:
      - gh-pages
    paths:
      - _data/books.json

jobs:
  generatefiles:
  # because we're adding a file and deleting one existing from the current commit, it is required that write permissions are given
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: 'gh-pages'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: pip install pyyaml

    - name: Generate book pages
      run: |
        python3 scripts/generate_book_pages.py
        echo "Books folder contents:"
        find books/ -type f || echo "books/ folder is empty or missing"

    - name: Add new files and commit
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add -A books/
        git diff --cached --quiet || git commit -m 'Automatically added new book' && git push