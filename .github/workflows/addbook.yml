name: Automatically generate new jekyll page per book

on:
  push:
    branches:
      - gh-pages
    paths:
      - _data/books.json

jobs:
  generatefiles:
  # because we're adding a file and deleting one existing from the current commit, it is required that write permissions are given
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: 'gh-pages'

    - name: Per book generate a page
      run: |
        jq -c '.[]' _data/books.json | while read entry; do
          isbn=$(echo "$entry" | jq -r 'keys[0]' | sed 's/ISBN://')
          title=$(echo "$entry" | jq -r '.[].title')
          mkdir -p "books/$isbn"
          cat > "books/$isbn/index.md" <<EOF
          ---
          layout: book
          isbn: $isbn
          title: "$title"
          ---
          EOF
          done

    - name: Add new files and commit
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add books/*
        git commit -m 'Automatically added new book ...'
        git push